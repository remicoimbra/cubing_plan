<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Cubing Practice Plans</title>
  </head>
  <body>
    <h1>Generate your own cubing practice plan.</h1>

    <form id="planning-form">
      <h3>1. Importance of focus (1 = Low, 5 = High)</h3>

      <div class="range-group">
        <label for="lookahead">Look ahead</label>
        <input type="range" id="lookahead" min="1" max="5" value="3" />
      </div>

      <div class="range-group">
        <label for="inspection">Inspection</label>
        <input type="range" id="inspection" min="1" max="5" value="3" />
      </div>

      <div class="range-group">
        <label for="turning">Turning</label>
        <input type="range" id="turning" min="1" max="5" value="3" />
      </div>

      <div class="range-group">
        <label for="algorithms">Learning algorithms</label>
        <input type="range" id="algorithms" min="1" max="5" value="3" />
      </div>

      <div class="range-group">
        <label for="solutions">Solutions</label>
        <input type="range" id="solutions" min="1" max="5" value="3" />
      </div>

      <h3>2. Daily availability</h3>
      <p class="section-hint">
        Enter how many minutes you can practice each day. Leave at 0 for rest
        days.
      </p>

      <div class="daily-time-group">
        <div class="daily-row">
          <label for="day-monday">Monday</label>
          <input
            type="number"
            id="day-monday"
            class="day-minutes"
            data-day="Monday"
            min="0"
            max="480"
            step="5"
            value="0"
            required
          />
          <span>min</span>
        </div>
        <div class="daily-row">
          <label for="day-tuesday">Tuesday</label>
          <input
            type="number"
            id="day-tuesday"
            class="day-minutes"
            data-day="Tuesday"
            min="0"
            max="480"
            step="5"
            value="0"
            required
          />
          <span>min</span>
        </div>
        <div class="daily-row">
          <label for="day-wednesday">Wednesday</label>
          <input
            type="number"
            id="day-wednesday"
            class="day-minutes"
            data-day="Wednesday"
            min="0"
            max="480"
            step="5"
            value="0"
            required
          />
          <span>min</span>
        </div>
        <div class="daily-row">
          <label for="day-thursday">Thursday</label>
          <input
            type="number"
            id="day-thursday"
            class="day-minutes"
            data-day="Thursday"
            min="0"
            max="480"
            step="5"
            value="0"
            required
          />
          <span>min</span>
        </div>
        <div class="daily-row">
          <label for="day-friday">Friday</label>
          <input
            type="number"
            id="day-friday"
            class="day-minutes"
            data-day="Friday"
            min="0"
            max="480"
            step="5"
            value="0"
            required
          />
          <span>min</span>
        </div>
        <div class="daily-row">
          <label for="day-saturday">Saturday</label>
          <input
            type="number"
            id="day-saturday"
            class="day-minutes"
            data-day="Saturday"
            min="0"
            max="480"
            step="5"
            value="0"
            required
          />
          <span>min</span>
        </div>
        <div class="daily-row">
          <label for="day-sunday">Sunday</label>
          <input
            type="number"
            id="day-sunday"
            class="day-minutes"
            data-day="Sunday"
            min="0"
            max="480"
            step="5"
            value="0"
            required
          />
          <span>min</span>
        </div>
      </div>

      <button type="submit" id="submit-btn">Generate Plan</button>
    </form>

    <div id="resultat-planning"></div>

    <script src="main.js" defer></script>
  </body>
</html>
